name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: Public backend API URL including /api
        required: true
        default: https://api.example.com/api
      apk_download_url:
        description: Public APK download URL shown on the login page
        required: false
        default: https://app.example.com/downloads/mypos-latest.apk

jobs:
  build-android-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build web assets for Android
        run: npm run build
        env:
          VITE_API_URL: ${{ inputs.api_url }}
          VITE_MOBILE_API_URL: ${{ inputs.api_url }}
          VITE_ANDROID_APP_DOWNLOAD_URL: ${{ inputs.apk_download_url }}

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
        working-directory: ./frontend/android

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: ./frontend/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mypos-android-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
