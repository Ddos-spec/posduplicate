<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Reverse-proxied access via my-aicustom.com/myerp forwards the full
      // "/myerp" prefix without stripping it and without a trailing slash,
      // so the browser's default relative-URL resolution (against "/")
      // would request assets from the wrong place. Pin an explicit <base>
      // before any other resource tag is parsed so every relative
      // reference below resolves correctly no matter which of the two
      // hosts served this page.
      (function () {
        var p = window.location.pathname;
        var base = p === '/myerp' || p.indexOf('/myerp/') === 0 ? '/myerp/' : '/';
        var baseEl = document.createElement('base');
        baseEl.href = base;
        document.head.appendChild(baseEl);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/branding/omnipilot-mark.svg" />

    <!-- Viewport optimized for tablets -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>OmniPilot AI - Point of Sale System</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#2563eb" />

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OmniPilot AI" />

    <!-- Android/Chrome PWA Support -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Fullscreen mode -->
    <meta name="fullscreen" content="yes" />
    <meta name="browsermode" content="application" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
